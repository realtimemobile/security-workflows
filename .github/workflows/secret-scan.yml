# =============================================================================
# REUSABLE Secret & Sensitive Data Scanner
# Lives in: your-username/security-workflows
# Path:     .github/workflows/secret-scan.yml
#
# Called by other repos with a minimal 10-line workflow.
# =============================================================================
name: Reusable Secret Scan

on:
  workflow_call:
    inputs:
      scan_mode:
        description: 'full-history or pr-diff'
        required: false
        default: 'full-history'
        type: string
      extra_file_patterns:
        description: 'Additional sensitive file regex patterns (pipe-separated)'
        required: false
        default: ''
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  gitleaks-scan:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch shared Gitleaks config
        run: |
          curl -sSfL \
            "https://raw.githubusercontent.com/${CONFIG_REPO}/main/.gitleaks.toml" \
            -o .gitleaks.toml
        env:
          # This will be set by the caller or default to your central repo
          CONFIG_REPO: ${{ github.repository_owner }}/security-workflows

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Run Gitleaks (full history)
        if: inputs.scan_mode == 'full-history'
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --report-format sarif \
            --report-path results.sarif \
            --log-opts="--all" \
            --verbose \
            --exit-code 1 || echo "GITLEAKS_FOUND=true" >> $GITHUB_ENV

      - name: Run Gitleaks (PR diff only)
        if: inputs.scan_mode == 'pr-diff'
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --report-format sarif \
            --report-path results.sarif \
            --log-opts="origin/${{ github.base_ref }}..HEAD" \
            --verbose \
            --exit-code 1 || echo "GITLEAKS_FOUND=true" >> $GITHUB_ENV

      - name: Upload SARIF report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report-${{ github.sha }}
          path: results.sarif
          retention-days: 30

      - name: Fail if secrets found
        if: env.GITLEAKS_FOUND == 'true'
        run: |
          echo "::error::Gitleaks detected secrets — see artifact for details"
          exit 1

  sensitive-file-scan:
    name: Sensitive File Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan current tree for sensitive files
        run: |
          echo "========================================"
          echo "  SENSITIVE FILE SCAN — CURRENT TREE"
          echo "========================================"

          FOUND=0

          echo ""
          echo ">> Private Keys & Certificates"
          KEYS=$(find . -type f \( \
            -name "*.pem" -o -name "*.key" -o -name "*.p12" -o -name "*.pfx" \
            -o -name "*.cer" -o -name "*.crt" -o -name "*.der" -o -name "*.jks" \
            -o -name "*.keystore" -o -name "*.p8" \
          \) ! -path "./.git/*" 2>/dev/null)
          if [ -n "$KEYS" ]; then echo "$KEYS"; FOUND=1; else echo "  (none)"; fi

          echo ""
          echo ">> Environment & Config Files"
          ENVS=$(find . -type f \( \
            -name ".env" -o -name ".env.*" -o -name "*.env" \
            -o -name "credentials" -o -name "credentials.*" \
            -o -name "*.credential" -o -name "*.secret" \
            -o -name "service-account*.json" -o -name "sa-*.json" \
            -o -name "firebase*.json" -o -name "gcloud*.json" \
          \) ! -path "./.git/*" ! -path "./node_modules/*" 2>/dev/null)
          if [ -n "$ENVS" ]; then echo "$ENVS"; FOUND=1; else echo "  (none)"; fi

          echo ""
          echo ">> SSH Keys"
          SSH=$(find . -type f \( \
            -name "id_rsa" -o -name "id_dsa" -o -name "id_ecdsa" \
            -o -name "id_ed25519" -o -name "*.ppk" \
          \) ! -path "./.git/*" 2>/dev/null)
          if [ -n "$SSH" ]; then echo "$SSH"; FOUND=1; else echo "  (none)"; fi

          echo ""
          echo ">> Terraform State & Database Files"
          MISC=$(find . -type f \( \
            -name "*.tfstate" -o -name "*.tfstate.*" \
            -o -name "*.sqlite" -o -name "*.sqlite3" -o -name "*.db" \
          \) ! -path "./.git/*" ! -path "./node_modules/*" 2>/dev/null)
          if [ -n "$MISC" ]; then echo "$MISC"; FOUND=1; else echo "  (none)"; fi

          # Optional: caller-provided extra patterns
          EXTRA="${{ inputs.extra_file_patterns }}"
          if [ -n "$EXTRA" ]; then
            echo ""
            echo ">> Custom Patterns"
            CUSTOM=$(find . -type f ! -path "./.git/*" 2>/dev/null | grep -E "$EXTRA")
            if [ -n "$CUSTOM" ]; then echo "$CUSTOM"; FOUND=1; else echo "  (none)"; fi
          fi

          echo ""
          if [ "$FOUND" -eq 1 ]; then
            echo "⚠️  SENSITIVE FILES DETECTED"
            exit 1
          else
            echo "✅  No sensitive files found"
          fi

      - name: Scan git history for deleted sensitive files
        if: always()
        run: |
          echo "========================================"
          echo "  HISTORICAL SCAN — DELETED SECRETS"
          echo "========================================"

          PATTERNS='\.pem$|\.key$|\.p12$|\.pfx$|\.env$|\.secret$|\.credential|id_rsa|id_dsa|id_ecdsa|id_ed25519|\.ppk$|\.tfstate|service-account.*\.json|\.jks$|\.keystore$'

          EXTRA="${{ inputs.extra_file_patterns }}"
          if [ -n "$EXTRA" ]; then
            PATTERNS="${PATTERNS}|${EXTRA}"
          fi

          HIST=$(git log --all --diff-filter=D --name-only --pretty=format: | grep -E "$PATTERNS" | sort -u)

          if [ -n "$HIST" ]; then
            echo "$HIST"
            echo ""
            echo "⚠️  Deleted sensitive files still exist in git history!"
            exit 1
          else
            echo "✅  No deleted sensitive files in history"
          fi
